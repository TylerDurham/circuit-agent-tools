# Name: Agent Tool - Recall All Memory Fragments
kind: TaskDialog
response:
  activity:
  mode: Generated

inputs:
  - kind: ManualTaskInput
    propertyName: text
    value: =Env.circuit_RootPathToMemories

modelDisplayName: Agent Tool | Recall All Memory Fragments
modelDescription: |-
  This is a simple tool that allows the agent to retrieve content (called "memory" or "memory fragments") from a location in OneDrive for Business.

  # Inputs

  - Path: The path to where the memories will be stored. It should be a root relative path (exampe: /Agent Tools/Memory).

  # Outputs

  - Memories: A JSON formatted string containing an array of all memories located in the specifed Path.
outputs:
  - propertyName: memories

action:
  kind: InvokeFlowTaskAction
  flowId: 12965933-731e-f111-8341-000d3a19bd5b

outputMode: All