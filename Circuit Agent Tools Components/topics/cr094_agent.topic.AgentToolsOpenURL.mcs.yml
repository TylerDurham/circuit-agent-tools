# Name: Agent Tools | Open URL
# Displays a simple message that opens a URL for the user.
kind: AdaptiveDialog
inputs:
  - kind: AutomaticTaskInput
    propertyName: inTitle
    name: Title
    description: The title to display for the URL.
    shouldPromptUser: true

  - kind: AutomaticTaskInput
    propertyName: inMessage
    name: Message
    description: A brief message describing the URL.
    shouldPromptUser: true

  - kind: AutomaticTaskInput
    propertyName: inURL
    name: URL
    description: The URL to open.
    entity: URLPrebuiltEntity
    shouldPromptUser: true

modelDescription: |-
  This topic allows the agent to display a message that opens a URL for the user. It takes three inputs:

  # Inputs

  - inTitle: A simple title for the message. You can use "Agent Tools" as a default value.
  - inMessage: A brief message. 
  - inURL: The URL to open.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent: {}
  actions:
    - kind: SendActivity
      id: sendActivity_6DKWdt
      activity:
        attachments:
          - kind: AdaptiveCardTemplate
            cardContent: |-
              ={
                type: "AdaptiveCard",
                '$schema': "https://adaptivecards.io/schemas/adaptive-card.json",
                version: "1.5",
                body: [
                  {
                    type: "ColumnSet",
                    columns: [
                      {
                        type: "Column",
                        width: "auto",
                        items: [
                          {
                            type: "Image",
                            url: "data:image/png;base64,",
                            spacing: "None"
                          }
                        ],
                        style: "accent",
                        bleed: true
                      },
                      {
                        type: "Column",
                        width: "stretch",
                        items: [
                          {
                            type: "TextBlock",
                            text: Topic.inTitle,
                            wrap: true,
                            style: "heading",
                            color: "Accent"
                          },
                          {
                            type: "TextBlock",
                            text: Topic.inMessage,
                            wrap: true,
                            style: "default",
                            fontType: "Default",
                            color: "Default",
                            separator: true
                          }
                        ]
                      }
                    ]
                  },
                  {
                    type: "ActionSet",
                    actions: [
                      {
                        type: "Action.OpenUrl",
                        title: "Check it Out!",
                        tooltip: "Opens the link in a new browser window.",
                        style: "positive",
                        url: Topic.inURL
                      }
                    ]
                  }
                ]
              }

    - kind: EndDialog
      id: 59X8Jq

inputType:
  properties:
    inMessage:
      displayName: Message
      description: A brief message describing the URL.
      type: String

    inTitle:
      displayName: Title
      description: The title to display for the URL.
      type: String

    inURL:
      displayName: URL
      description: The URL to open.
      type: String

outputType: {}